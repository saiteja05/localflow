name: release
on:
  push:
    tags: ["v*"]
jobs:
  build-release:
    runs-on: macos-26
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.5.app/Contents/Developer
    steps:
      - uses: actions/checkout@v4
      - name: Install XcodeGen and create-dmg
        run: brew install xcodegen create-dmg
      - name: Tests
        run: swift test
      - name: Build app
        run: |
          cd App && xcodegen && cd ..
          xcodebuild -project App/LocalFlow.xcodeproj -scheme LocalFlow \
            -configuration Release -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" build
      - name: Build DMG
        run: scripts/build-dmg.sh build/Build/Products/Release/LocalFlow.app .
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: LocalFlow.dmg
          body: |
            Unsigned build, after opening the DMG and dragging LocalFlow to Applications, run once:
            `xattr -dr com.apple.quarantine /Applications/LocalFlow.app` or right-click → Open.
            (Developer ID signing + notarization planned.)
