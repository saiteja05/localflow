name: ci
on: [push, pull_request]
jobs:
  build-and-test:
    runs-on: macos-26
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.5.app/Contents/Developer
    steps:
      - uses: actions/checkout@v4
      - name: Toolchain
        run: swift --version && xcrun --sdk macosx --show-sdk-version
      - name: Build
        run: swift build
      - name: Test
        run: swift test
